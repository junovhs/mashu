<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mashu</title>
        <link
            rel="icon"
            href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3E%3Cpath d='M3 5a2 2 0 0 1 2-2h3.586a1 1 0 0 1 .707.293L10.707 5H15a2 2 0 0 1 2 2v1H3V5z' fill='%23F6821F'/%3E%3Cpath d='M3 8h14v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8z' fill='%23F6821F' fill-opacity='.7'/%3E%3C/svg%3E"
        />

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />

        <!-- CodeMirror CSS -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/material-darker.min.css"
        />

        <!-- Application styles are now imported via JS to ensure proper bundling -->
    </head>

    <body>
        <div id="pageLoader">
            <video autoplay loop muted playsinline>
                <source src="/assets/loading.webm" type="video/webm" />
                Your browser does not support the video tag.
            </video>
            <p>Loading Mashu</p>
        </div>

        <div id="appContainer">
            <aside id="leftSidebar"></aside>
            <div id="sidebarResizer"></div>
            <main id="mainView"></main>
            <aside id="rightStatsPanel"></aside>
        </div>

        <div
            id="scaffoldImportModal"
            class="diff-modal"
            style="display: none"
        ></div>

        <!-- JS Libraries -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/meta.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/mode/loadmode.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/runmode/runmode.js"></script>
        <script src="/js/jszip.min.js"></script>

        <!-- Main Application Logic -->
        <script type="module" src="src/ts/app.ts"></script>
    </body>
</html>
